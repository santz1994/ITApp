# Docker Compose for QutyApp — Local Development
# Services: PHP-FPM 8.1, Nginx, MySQL 8, Redis, Node (frontend)
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f app
# Shell:  docker compose exec app bash
# Artisan: docker compose exec app php artisan <command>

services:
  # ──────────────────────────────────────────────
  # PHP-FPM 8.1 + Laravel 10
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: qutyapp-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - qutyapp-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=qutyapp
      - DB_USERNAME=qutyapp
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis

  # ──────────────────────────────────────────────
  # Nginx reverse-proxy
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: qutyapp-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - qutyapp-net
    depends_on:
      - app

  # ──────────────────────────────────────────────
  # MySQL 8
  # ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: qutyapp-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: qutyapp
      MYSQL_USER: qutyapp
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - qutyapp-net
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-prootsecret",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Redis 7 — cache + queue + session
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qutyapp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - qutyapp-net

  # ──────────────────────────────────────────────
  # Node 18 — frontend dev server
  # Run: docker compose run --rm node npm install
  #      docker compose up node   (for dev server)
  # ──────────────────────────────────────────────
  node:
    image: node:18-alpine
    container_name: qutyapp-node
    working_dir: /var/www/html/frontend
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/frontend/node_modules
    networks:
      - qutyapp-net
    entrypoint: ["npm"]
    command: ["start"]
    ports:
      - "3000:3000"
    profiles:
      - frontend

volumes:
  mysql-data:
  redis-data:
  node-modules:

networks:
  qutyapp-atk-net:
    driver: bridge
